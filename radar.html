<div style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background:black;">
<canvas id="radar"></canvas>
</div>

<script>
var canvas = document.getElementById("radar");
var ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

var angle = 0;

function drawRadar() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, 300, 0, 2*Math.PI);
    ctx.strokeStyle = "red";
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(canvas.width/2, canvas.height/2);
    ctx.lineTo(
        canvas.width/2 + 300*Math.cos(angle),
        canvas.height/2 + 300*Math.sin(angle)
    );
    ctx.strokeStyle = "red";
    ctx.stroke();

    angle += 0.02;
    requestAnimationFrame(drawRadar);
}

drawRadar();
</script>
